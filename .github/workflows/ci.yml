name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas scikit-learn matplotlib seaborn networkx tqdm biopython torch pytest

      - name: Compile Python files
        run: python -m compileall .

      - name: Run tests
        run: pytest

